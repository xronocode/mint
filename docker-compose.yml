services:
  mint:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-qwen3:latest}
      - MINT_MODEL_TIER=${MINT_MODEL_TIER:-frontier}
      - MINT_SEVERITY_MODE=${MINT_SEVERITY_MODE:-audit}
    restart: unless-stopped
    volumes:
      - mint-output:/app/output
      - mint-tokens:/app/tokens

volumes:
  mint-output:
  mint-tokens:
