# Anthropic Claude baseline — design system extracted from
# docs/reference/docx_showcase_guide.md (May 2026).
#
# This is the KLAWD preset: blue-primary corporate palette, Arial throughout,
# Courier New for code. Spacing in points (loader handles DXA conversion via
# Pt at the OOXML emit boundary).
$schema: https://mint.dev/schema/style-preset-1.0.json
name: klawd
version: "1.0"
description: Anthropic Claude baseline — primary-blue corporate identity per docs/reference/docx_showcase_guide.md

color_palette:
  primary:    "#1B3A5C"   # Primary Blue — H1, table headers, cover
  secondary:  "#2E75B6"   # Accent Blue — H2, callout borders, links
  accent:     "#D5E8F0"   # Light Blue — dividers, decorative
  text:       "#333333"   # Dark Gray — body text
  text_muted: "#666666"   # Medium Gray — captions, secondary
  background: "#FFFFFF"
  border:     "#D5E8F0"
  success:    "#2E8B57"   # Success Green
  warning:    "#E8A838"   # Warning Amber
  error:      "#C0392B"   # Error Red

typography:
  heading1:
    font: Arial
    size_pt: 16
    color: "@primary"
    bold: true
    alignment: left
    spacing_before_pt: 18      # 360 DXA per spec
    spacing_after_pt: 12       # 240 DXA
    line_height: 1.25
    keep_with_next: true
  heading2:
    font: Arial
    size_pt: 14
    color: "@secondary"        # Accent Blue per spec §1.2
    bold: true
    alignment: left
    spacing_before_pt: 12      # 240 DXA
    spacing_after_pt: 9        # 180 DXA
    line_height: 1.3
    keep_with_next: true
  heading3:
    font: Arial
    size_pt: 12
    color: "@primary"
    bold: true
    alignment: left
    spacing_before_pt: 9       # 180 DXA
    spacing_after_pt: 6        # 120 DXA
    line_height: 1.35
    keep_with_next: true
  body:
    font: Arial
    size_pt: 11
    color: "@text"
    alignment: left
    spacing_before_pt: 0
    spacing_after_pt: 6        # 120 DXA per spec
    line_height: 1.45
  table_header:
    font: Arial
    size_pt: 11
    color: "@background"       # white text on primary-blue fill
    bold: true
    alignment: left
    spacing_before_pt: 0
    spacing_after_pt: 0
    line_height: 1.2
  caption:
    font: Arial
    size_pt: 9
    color: "@text_muted"
    italic: true
    alignment: left
    spacing_before_pt: 2
    spacing_after_pt: 6
    line_height: 1.3

spacing:
  paragraph_default_before_pt: 0
  paragraph_default_after_pt: 6   # body rhythm — matches §1.3
  default_line_height: 1.45
  table_cell_padding_pt: 4
