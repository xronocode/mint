# MINT report template (Phase-16 — MP-DOC-BUNDLE)
#
# Third governed doc_type after memo and letter. Demonstrates that adding
# a new doc_type is purely a YAML file: no Python changes, no engine
# extension. The create_document pipeline (mint_python.mcp.document)
# reads this file, walks required_fields for elicitation in declaration
# order, then walks `layout` to assemble the docx.

name: report
version: "1.0"
description: "Standard report — title, author, date, summary, sections, conclusions"
doc_type: report

# Required fields, in declaration order. The elicitation loop iterates
# THIS list — title first, then author, etc. — so missing-field prompts
# arrive in report-natural order.
required_fields:
  - title
  - author
  - date
  - summary
  - sections
  - conclusions

# Block sequence the assembler emits. Engine supports only:
#   {kind: heading, level: 1..3, text: "..."}
#   {kind: paragraph, text: "..."}
#   {kind: spacer}
# Stacking spacers between sections gives visual rhythm without needing
# any new block kind.
layout:
  - kind: heading
    level: 1
    text: "{{ title }}"
  - kind: paragraph
    text: "By: {{ author }} — {{ date }}"
  - kind: spacer
  - kind: heading
    level: 2
    text: Summary
  - kind: paragraph
    text: "{{ summary }}"
  - kind: spacer
  - kind: heading
    level: 2
    text: Sections
  - kind: paragraph
    text: "{{ sections }}"
  - kind: spacer
  - kind: heading
    level: 2
    text: Conclusions
  - kind: paragraph
    text: "{{ conclusions }}"
